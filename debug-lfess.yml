2026-07-01 20:38:18,656 [DEBUG] Checking for overlay 'extra.summary_use_case' - current 'empty' - overlay 'TROLIE is an open conformance standard and cultivates a software ecosystem to accelerate the implementation of reliable, secure, and interoperable systems for the exchange of transmission facility ratings and related information. Most organizations involved in the operation of the transmission system in North America now need to exchange ratings and related information in an automated, frequent manner. This project will help accelerate their implementation and simplify interoperability.

The project’s specific aims are:
- Define API specification for the exchange of ratings and ratings-related information to support organizations working to comply with FERC Order 881.
- A conformance program that emulates the Zowe Conformance Program or the Certified Kubernetes Conformance Program insofar as they give vendors a means to demonstrate their conformance to the above specification and signal their commitment to maintaining their conformance over time.
- An open commons for the development of clients of the API specification.
'
