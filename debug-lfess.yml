2026-07-01 20:38:36,815 [DEBUG] Checking for overlay 'description' - current 'Utility Rate Plan Exchange (URPX) aims to develop a comprehensive, standardized method for representing and exchanging utility rate plan data in machine-accessible format. URPX will provide a solid yet versatile foundation that governments, utilities, vendors, and technology companies can leverage to improve transparency in energy pricing and clean energy procurement. The project builds upon an existing collaboration between NREL and Flux Tailor and aims to address the fragmented approach currently used by vendors who handle rate plan calculations in silos using custom logic and rules-based systems.' - overlay 'Utility Rate Plan Exchange (URPX) aims to develop a comprehensive, standardized method for representing and exchanging utility rate plan data in machine-accessible format. URPX will provide a solid yet versatile foundation that governments, utilities, vendors, and technology companies can leverage to improve transparency in energy pricing and clean energy procurement. The project builds upon an existing collaboration between NREL and Flux Tailor and aims to address the fragmented approach currently used by vendors who handle rate plan calculations in silos using custom logic and rules-based systems.'
